<section id="experiance" class="wrap">
    <div class="section-head">
        <span class="section-tag">EXPERIENCE</span>
        <h2 class="section-title">Work Experience</h2>
    </div>

    <div class="timeline">
        @for (exp of experiences; track exp.role) {
        <div class="exp-card">
            <div class="exp-dot" [class.active]="exp.isActive"></div>
            <div class="card-inner glass">
                <div class="card-top">
                    <div>
                        <p class="role">{{ exp.role }}</p>
                        <p class="company">
                            <i class="ti ti-building" aria-hidden="true"></i>
                            {{ exp.company }}
                        </p>
                    </div>
                    <span class="date-badge">{{ exp.duration }}</span>
                </div>
                <p class="desc">{{ exp.description }}</p>
                <ul class="bullets">
                    @for (bullet of exp.bullets; track bullet) {
                    <li>{{ bullet }}</li>
                    }
                </ul>
                <div class="tags">
                    @for (tag of exp.tags; track tag) {
                    <span class="tag">{{ tag }}</span>
                    }
                </div>
            </div>
        </div>
        }
    </div>
</section>
